spring:
  application:
    name: dublin-bikes
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: ALWAYS
    serialization:
      write-dates-as-timestamps: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC
    show-sql: false

  mail:
    host: ${MAIL_SERVER:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: ${MAIL_USE_TLS:true}
      mail.smtp.ssl.enable: ${MAIL_USE_SSL:false}

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:5000}
  servlet:
    encoding:
      charset: UTF-8
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    dev.kaiwen.bikes: INFO
    org.hibernate.SQL: WARN

app:
  jwt:
    access-secret: ${JWT_SECRET_KEY}
    refresh-secret: ${JWT_REFRESH_SECRET_KEY}
    access-expires-seconds: ${JWT_ACCESS_EXPIRES_SECONDS:900}
    refresh-expires-seconds: ${JWT_REFRESH_EXPIRES_SECONDS:604800}
  verification:
    code-expire-seconds: ${VERIFICATION_CODE_EXPIRE_SECONDS:300}
    resend-cooldown-seconds: ${VERIFICATION_CODE_RESEND_COOLDOWN_SECONDS:60}
  mail:
    from: ${MAIL_FROM:}
    from-name: ${MAIL_DEFAULT_FROM_NAME:Dublin Bikes}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
