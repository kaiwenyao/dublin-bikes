spring:
  application:
    name: dublin-bikes
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: ALWAYS
    serialization:
      write-dates-as-timestamps: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    dev.kaiwen.bikes: INFO
    org.hibernate.SQL: WARN

resilience4j:
  retry:
    instances:
      gmaps:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - dev.kaiwen.bikes.exception.BusinessException

app:
  google-maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
    max-retries: 2

---
# Docker service discovery on dublin-bikes-network (non-secret; safe to commit).
# Server-mounted application-prod.yaml overrides datasource, JWT, mail, etc.
spring:
  config:
    activate:
      on-profile: prod

app:
  chat-service:
    base-url: ${CHAT_SERVICE_BASE_URL:http://dublin-bikes-chat-service:8002}
    connect-timeout-ms: 3000
    read-timeout-ms: 30000
    stream-timeout-ms: 120000
    title-timeout-ms: 8000

  prediction-service:
    base-url: ${PREDICTION_SERVICE_BASE_URL:http://dublin-bikes-prediction-service:8001}
    connect-timeout-ms: 3000
    read-timeout-ms: 15000
