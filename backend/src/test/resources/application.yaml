spring:
  profiles:
    active: test

  datasource:
    url: jdbc:h2:mem:dublinbikes;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: ALWAYS

  mail:
    host: ""

  thymeleaf:
    check-template-location: false

app:
  chat-service:
    base-url: http://localhost:8002
    connect-timeout-ms: 1000
    read-timeout-ms: 5000
    stream-timeout-ms: 10000
    title-timeout-ms: 3000

  jwt:
    access-secret: test-access-secret-key-at-least-32-bytes!!
    refresh-secret: test-refresh-secret-key-at-least-32-bytes!!
    access-expires-seconds: 900
    refresh-expires-seconds: 604800

  verification:
    code-expire-seconds: 300
    resend-cooldown-seconds: 60

  mail:
    from: test@example.com
    from-name: Dublin Bikes Test
    frontend-base-url: http://localhost:5173
